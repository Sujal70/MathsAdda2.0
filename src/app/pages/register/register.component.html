<div class="register-page">
  <!-- Navbar -->
  <nav class="navbar" [class.scrolled]="isScrolled">
    <div class="container nav-container">
      <a routerLink="/home" class="logo">
        <img src="assets/maths_adda_logo.jpg" alt="Maths Adda" class="logo-img">
        <span class="logo-name">Maths<span class="logo-name-accent">Adda</span></span>
      </a>
    </div>
  </nav>

  <!-- Register Section -->
  <section class="register-section">
    <div class="register-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
    </div>
    <div class="container">
      <div class="register-card">
        <div class="register-header">
          <h2>Create your account</h2>
          <p>Join Maths Adda and start your learning journey today.</p>
        </div>

        <form #registerForm="ngForm" (ngSubmit)="onRegister(registerForm)" class="register-form" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="name"
                [(ngModel)]="name"
                name="name"
                placeholder="Enter your full name"
                minlength="2"
                maxlength="100"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                [(ngModel)]="email"
                name="email"
                placeholder="Enter your email"
                pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-wrapper">
              <i class="fas fa-phone"></i>
              <input
                type="tel"
                id="phone"
                [(ngModel)]="phone"
                name="phone"
                placeholder="10-digit mobile number"
                pattern="^[0-9]{10}$"
                maxlength="10"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                [(ngModel)]="password"
                name="password"
                placeholder="At least 6 characters"
                minlength="6"
                required
              />
              <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                id="confirmPassword"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                placeholder="Re-enter your password"
                required
              />
              <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
                <i [class]="showConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-full" [disabled]="isLoading">
            <i class="fas fa-user-plus"></i> {{ isLoading ? 'Creating account...' : 'Sign Up' }}
          </button>

          @if (errorMessage) {
            <div class="error-message">
              <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
            </div>
          }
        </form>

        <div class="register-footer">
          <p>Already have an account? <a routerLink="/login" class="login-link">Login here</a></p>
        </div>
      </div>
    </div>
  </section>
</div>
