<div class="login-page">
  <!-- Navbar -->
  <nav class="navbar" [class.scrolled]="isScrolled">
    <div class="container nav-container">
      <a routerLink="/home" class="logo">
        <img src="assets/maths_adda_logo.jpg" alt="Maths Adda" class="logo-img">
        <span class="logo-name">Maths<span class="logo-name-accent">Adda</span></span>
      </a>
    </div>
  </nav>

  <!-- Login Section -->
  <section class="login-section">
    <div class="login-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
    </div>
    <div class="container">
      <div class="login-card">
        <div class="login-header">
          <h2>Student Login</h2>
          <p>Welcome back! Please login to continue your learning journey.</p>
        </div>
        <form (ngSubmit)="onLogin()" class="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                [(ngModel)]="email"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
              </button>
            </div>
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-full" [disabled]="isLoading">
            <i class="fas fa-sign-in-alt"></i> {{ isLoading ? 'Logging in...' : 'Login' }}
          </button>
          <div class="error-message" *ngIf="errorMessage">
            <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
          </div>
        </form>
        <div class="login-footer">
          <p>Don't have an account? <a routerLink="/register" class="register-link">Register here</a></p>
        </div>
      </div>
    </div>
  </section>
</div>
